name: Deploy Logistics Pipeline (Zero Cost)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Directories and Permissions
        run: |
          mkdir -p data/models data/alerts data/validated data/processed data/raw
          chmod -R 777 data
          mkdir -p mlflow_export

      - name: Build and Start Docker Services
        run: |
          docker compose up --build -d

      - name: Wait for Airflow Webserver (REST API)
        run: |
          echo "Waiting for Airflow webserver to become healthy..."
          timeout 600s bash -c '
            until curl -sSf -u admin:admin http://localhost:8080/api/v1/health 2>/dev/null | grep -q "\"healthy\""; do
              echo "  still waiting... ($(date +%T))"
              sleep 15
            done
          ' || {
            echo "=== TIMEOUT: Airflow did not become healthy. Dumping container logs ==="
            docker compose logs --no-color
            exit 1
          }
          echo "Airflow REST API is healthy!"

      - name: Wait for MLflow Server
        run: |
          echo "Waiting for MLflow server to become ready..."
          timeout 300s bash -c '
            until curl -sf http://localhost:5000/ping 2>/dev/null | grep -q "OK"; do
              echo "  MLflow not ready yet... ($(date +%T))"
              sleep 10
            done
          ' || echo "WARNING: MLflow health check timed out — training will run in local-only mode."
          echo "MLflow check done."

      - name: Trigger DAG via REST API
        run: |
          echo "Triggering logistics_delay_pipeline via REST API..."
          RESPONSE=$(curl -sSf -u admin:admin \
            -X POST "http://localhost:8080/api/v1/dags/logistics_delay_pipeline/dagRuns" \
            -H "Content-Type: application/json" \
            -d '{"conf": {}}')
          echo "Trigger response: $RESPONSE"
          DAG_RUN_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['dag_run_id'])")
          echo "DAG_RUN_ID=$DAG_RUN_ID" >> $GITHUB_ENV
          echo "DAG run triggered: $DAG_RUN_ID"

      - name: Wait for DAG Completion via REST API
        run: |
          echo "Polling DAG run state for: $DAG_RUN_ID"
          timeout 3600s bash -c '
            while true; do
              STATE=$(curl -sSf -u admin:admin \
                "http://localhost:8080/api/v1/dags/logistics_delay_pipeline/dagRuns/$DAG_RUN_ID" \
                2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get(\"state\",\"unknown\"))" 2>/dev/null || echo "unknown")
              echo "  DAG state: [$STATE]  ($(date +%T))"
              if [[ "$STATE" == "success" ]]; then
                echo "DAG succeeded!"
                exit 0
              elif [[ "$STATE" == "failed" ]]; then
                echo "=== DAG FAILED. Fetching task instance states ==="
                curl -sSf -u admin:admin \
                  "http://localhost:8080/api/v1/dags/logistics_delay_pipeline/dagRuns/$DAG_RUN_ID/taskInstances" \
                  2>/dev/null | python3 -c "
                  import sys, json
                  data = json.load(sys.stdin)
                  for ti in data.get(\"task_instances\", []):
                      task_id = ti.get(\"task_id\", \"\")
                      state = ti.get(\"state\", \"\")
                      note = ti.get(\"note\", \"\")
                      print(f\"Task: {task_id} | State: {state} | Note: {note}\")
                  " || true
                exit 1
              fi
              sleep 20
            done
          ' || {
            echo "=== Timeout or failure. Dumping scheduler + webserver logs ==="
            docker compose logs --no-color airflow-scheduler airflow-webserver
            exit 1
          }
        env:
          DAG_RUN_ID: ${{ env.DAG_RUN_ID }}

      - name: Extract MLflow Artifacts
        if: always()
        run: |
          MLFLOW_CID=$(docker compose ps -q mlflow)
          if [ -n "$MLFLOW_CID" ]; then
            docker cp $MLFLOW_CID:/mlflow ./mlflow_export || true
            echo "MLflow artifacts copied."
          else
            echo "MLflow container not found."
          fi

      - name: Upload Models
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logistics-models
          path: data/models/
          if-no-files-found: warn

      - name: Upload MLflow Runs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: ./mlflow_export/
          if-no-files-found: warn
