name: Deploy Logistics Pipeline (Zero Cost)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Directories and Permissions
        # Airflow runs as UID 50000. Give it permission to write data artifacts.
        run: |
          mkdir -p data/models data/alerts data/validated data/processed data/raw
          chmod -R 777 data
          mkdir -p mlflow_export

      - name: Start Docker Services
        run: |
          docker compose up --build -d

      - name: Wait for Health Checks
        run: |
          echo "Waiting for Airflow to become healthy..."
          # MLflow /health returns 404 on some versions, so we only poll Airflow. Airflow booting guarantees the heavy deps (XGBoost) are installed!
          timeout 600s bash -c 'until curl -sSf http://localhost:8080/health > /dev/null 2>&1; do echo "waiting for airflow..."; sleep 10; done' || { echo "TIMEOUT or ERROR! Dumping logs..."; docker compose logs; exit 1; }
          echo "Airflow is up!"

      - name: Trigger Airflow DAG
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "Triggering logistics_pipeline_dag..."
          docker compose exec -T -e API_KEY airflow-webserver airflow dags trigger logistics_delay_pipeline
          
          echo "Waiting for DAG to complete..."
          timeout 1200s bash -c '
            while true; do
              STATE=$(docker compose exec -T airflow-webserver airflow dags state logistics_delay_pipeline | tail -n 1 | tr -d "\r")
              echo "Current DAG state: $STATE"
              
              if [[ "$STATE" == "success" ]]; then
                echo "DAG succeeded!"
                break
              elif [[ "$STATE" == "failed" ]]; then
                echo "DAG failed!"
                docker compose logs
                exit 1
              fi
              sleep 15
            done
          ' || { echo "DAG Execution TIMEOUT! Dumping logs..."; docker compose logs; exit 1; }

      - name: Extract MLflow Artifacts
        if: always()
        run: |
          echo "Extracting mlflow data from the container volume..."
          MLFLOW_CID=$(docker compose ps -q mlflow)
          if [ ! -z "$MLFLOW_CID" ]; then
             docker cp $MLFLOW_CID:/mlflow ./mlflow_export || true
          fi

      - name: Upload Models
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logistics-models
          path: data/models/

      - name: Upload MLflow Runs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: ./mlflow_export/
