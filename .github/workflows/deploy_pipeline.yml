name: Deploy Logistics Pipeline (Zero Cost)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Directories and Permissions
        run: |
          mkdir -p data/models data/alerts data/validated data/processed data/raw
          chmod -R 777 data
          mkdir -p mlflow_export

      - name: Start Docker Services
        run: |
          docker compose up --build -d

      - name: Wait for Airflow Webserver
        run: |
          echo "Waiting for Airflow webserver to become healthy..."
          timeout 600s bash -c '
            until curl -sSf -o /dev/null -w "%{http_code}" http://localhost:8080/health | grep -q "200"; do
              echo "  still waiting... ($(date +%T))"
              sleep 10
            done
          ' || {
            echo "=== TIMEOUT: Airflow did not become healthy. Dumping logs ==="
            docker compose logs --no-color
            exit 1
          }
          echo "Airflow is healthy!"

      - name: Trigger Airflow DAG
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          echo "Triggering logistics_delay_pipeline..."
          docker compose exec -T airflow-webserver airflow dags trigger logistics_delay_pipeline

      - name: Wait for DAG Completion
        run: |
          echo "Polling DAG state..."
          timeout 1800s bash -c '
            while true; do
              STATE=$(docker compose exec -T airflow-webserver airflow dags state logistics_delay_pipeline 2>/dev/null | grep -v "^\[" | tail -n 1 | tr -d "\r\n ")
              echo "  DAG state: [$STATE]  ($(date +%T))"
              if [[ "$STATE" == "success" ]]; then
                echo "DAG succeeded!"
                exit 0
              elif [[ "$STATE" == "failed" ]]; then
                echo "DAG FAILED — dumping task logs..."
                docker compose exec -T airflow-webserver airflow tasks states-for-dag-run logistics_delay_pipeline $(date -u +%Y-%m-%dT%H:%M:%S) 2>/dev/null || true
                docker compose logs --no-color airflow-worker 2>/dev/null || true
                docker compose logs --no-color airflow-scheduler 2>/dev/null || true
                exit 1
              fi
              sleep 20
            done
          ' || {
            echo "=== Timeout or failure. Full logs ==="
            docker compose logs --no-color
            exit 1
          }

      - name: Extract MLflow Artifacts
        if: always()
        run: |
          MLFLOW_CID=$(docker compose ps -q mlflow)
          if [ -n "$MLFLOW_CID" ]; then
            docker cp $MLFLOW_CID:/mlflow ./mlflow_export || true
            echo "MLflow artifacts copied."
          else
            echo "MLflow container not found."
          fi

      - name: Upload Models
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logistics-models
          path: data/models/

      - name: Upload MLflow Runs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: ./mlflow_export/
